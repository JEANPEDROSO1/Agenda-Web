<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Agenda Web</title>
  <meta name="description" content="Visualize seu calendário de compromissos mensal e acompanhe seus próximos eventos na Agenda Web.">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="dashboard.css?v=final_fix_108">
</head>
<body class="auth-mesh-body">
  <!-- Fundo Animado -->
  <div class="mesh-background">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
  </div>

  <nav class="glass-nav">
    <div class="nav-container">
      <div class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Agenda Web</span>
      </div>
      
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="navbarMenu">
        <li><a href="dashboard.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Início
        </a></li>
        <li><a href="compromissos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          Compromissos
        </a></li>
        <li><button id="logoutLink" class="nav-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sair
        </button></li>
      </ul>
    </div>
  </nav>

  <main class="dashboard-main container">
    <!-- Cabeçalho e botão removidos a pedido do usuário -->

    <div class="dashboard-grid">
      <!-- CALENDÁRIO -->
      <section class="glass-card calendar-card">
        <div class="card-header">
          <button id="prevMonth" class="month-nav-btn" aria-label="Mês anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18L9 12L15 6"/></svg>
          </button>
          <h2 id="monthYear">Janeiro 2024</h2>
          <button id="nextMonth" class="month-nav-btn" aria-label="Próximo mês">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18L15 12L9 6"/></svg>
          </button>
        </div>
        
        <div class="calendar-wrapper">
          <div class="calendar-weekdays">
            <span>DOM</span><span>SEG</span><span>TER</span><span>QUA</span><span>QUI</span><span>SEX</span><span>SÁB</span>
          </div>
          <div class="calendar-grid" id="calendar">
            <!-- Gerado via JS -->
          </div>
        </div>
      </section>

      <!-- LISTA DE EVENTOS -->
      <section class="glass-card events-card">
        <div class="card-header">
          <h2>Próximos Eventos</h2>
        </div>
        <div class="events-list" id="eventsList">
          <!-- Gerado via JS -->
          <div class="empty-state">
            <p>Nenhum evento para este mês.</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Modal Logout -->
  <div id="logoutModal" class="glass-modal-overlay" style="display: none;">
    <div class="glass-modal-card">
      <h2>Sair da Conta</h2>
      <p>Tem certeza que deseja encerrar sua sessão?</p>
      <div class="modal-footer">
        <button id="cancelLogout" class="glass-btn-secondary">Cancelar</button>
        <button id="confirmLogout" class="glass-btn-danger">Sair</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="config.js?v=final_fix_108"></script>
  <script src="script.js?v=final_fix_108"></script>
  <script src="menu.js?v=final_fix_108"></script>
  <script src="dashboard.js?v=final_fix_108"></script>
  <script>
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
