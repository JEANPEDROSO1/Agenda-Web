<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Agenda Web</title>
  <meta name="description" content="Gerencie suas informações cadastrais, altere sua senha e atualize sua foto de perfil na Agenda Web.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="dashboard.css?v=final_fix_115">
  <link rel="stylesheet" href="perfil.css?v=final_fix_115">
</head>
<body class="auth-mesh-body">
  <!-- Fundo Animado -->
  <div class="mesh-background">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
  </div>

  <!-- Barra de Navegação -->
  <nav class="glass-nav">
    <div class="nav-container">
      <a href="dashboard.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Agenda Web</span>
      </a>
      
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="navbarMenu">
        <li><a href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Início
        </a></li>
        <li><a href="compromissos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          Compromissos
        </a></li>
        <li><a href="grupos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Grupos
        </a></li>
        <li><a href="perfil.html" class="active" style="display: flex; align-items: center; gap: 8px;">
          <div style="width: 24px; height: 24px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;">
            <img id="navUserAvatarImg" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <svg id="navUserAvatarPlaceholder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; margin: 0;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          Perfil
        </a></li>
        <li id="adminNavLink" style="display: none;"><a href="admin.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          Admin
        </a></li>
        <li><button id="logoutLink" class="nav-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sair
        </button></li>
      </ul>
    </div>
  </nav>

  <!-- Conteúdo Principal -->
  <div class="profile-container">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <button class="btn-back" onclick="window.location.href='dashboard.html'" style="padding: 10px 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Voltar
        </button>
        <h1 style="font-size: 1.8rem; font-weight: 800; color: #fff; margin: 0;">Meu Perfil</h1>
      </div>
    </div>
    
    <div class="profile-grid">
      
      <!-- LADO ESQUERDO: Foto e Role -->
      <aside class="glass-card avatar-card">
        <div class="profile-avatar-container" id="avatarTrigger" title="Clique para alterar a foto de perfil">
          <img src="" id="userAvatarImg" class="profile-avatar-img hidden" alt="Foto de perfil">
          <div id="userAvatarPlaceholder" class="profile-avatar-placeholder">--</div>
          <div class="photo-upload-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>
        </div>
        
        <!-- Input de arquivo invisível -->
        <input type="file" id="avatarFileInput" accept="image/png, image/jpeg, image/jpg, image/webp" style="display: none;">
        
        <h2 class="user-meta-name" id="userMetaName">Carregando...</h2>
        <span class="user-meta-role" id="userMetaRole">Membro</span>
      </aside>

      <!-- LADO DIREITO: Detalhes e Redefinição de Senha -->
      <section class="glass-card details-card">
        
        <!-- Formulário de Detalhes -->
        <form id="profileDetailsForm">
          <h2 class="section-title">Dados Cadastrais</h2>
          
          <div class="form-group-profile">
            <label for="profileNome">Nome Completo</label>
            <div class="profile-input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" id="profileNome" required placeholder="Seu nome completo">
            </div>
          </div>

          <div class="form-group-profile">
            <label for="profileEmail">Endereço de E-mail</label>
            <div class="profile-input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4H20V20H4V4Z" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 9H17" stroke-linecap="round"/>
                <path d="M7 13H13" stroke-linecap="round"/>
              </svg>
              <input type="email" id="profileEmail" disabled placeholder="seuemail@exemplo.com">
            </div>
          </div>

          <button type="submit" class="btn-profile-save" id="btnSaveDetails">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Salvar Alterações
          </button>
        </form>

      </section>
    </div>
  </div>

  <!-- Modal de Recorte de Avatar -->
  <div id="cropPhotoModal" class="glass-modal-overlay" style="display: none;">
    <div class="glass-modal-card" style="max-width: 480px; width: 90%;">
      <h2>Ajustar Foto de Perfil</h2>
      <p style="margin-bottom: 15px; font-size: 0.9rem; color: var(--text-muted);">Arraste a imagem para mover e use a barra para ajustar o zoom.</p>
      
      <!-- Container do canvas do cropper -->
      <div class="crop-container-wrapper" id="cropDragArea" style="position: relative; width: 100%; height: 280px; background: rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: move; user-select: none;">
        <canvas id="cropCanvas" style="border-radius: 8px; pointer-events: none;"></canvas>
        <!-- Circular overlay mask -->
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 40px solid rgba(15, 12, 27, 0.75); pointer-events: none; border-radius: 12px; box-sizing: border-box;">
          <div style="width: 100%; height: 100%; border: 2.5px dashed #8b5cf6; border-radius: 50%; box-sizing: border-box; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.25);"></div>
        </div>
      </div>

      <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px;">
          <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">Zoom:</span>
          <input type="range" id="cropZoomRange" min="0.1" max="3" step="0.02" value="1" style="flex: 1; accent-color: #8b5cf6; cursor: pointer; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px;">
        </div>
        <button id="btnCenterCrop" class="glass-btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; align-self: center;">Centralizar Foto</button>
      </div>

      <div class="modal-footer" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
        <button id="btnCancelCrop" class="glass-btn-secondary">Cancelar</button>
        <button id="btnConfirmCrop" class="glass-btn-primary" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: white;">Confirmar e Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal Logout -->
  <div id="logoutModal" class="glass-modal-overlay" style="display: none;">
    <div class="glass-modal-card">
      <h2>Sair da Conta</h2>
      <p>Tem certeza que deseja encerrar sua sessão?</p>
      <div class="modal-footer">
        <button id="cancelLogout" class="glass-btn-secondary">Cancelar</button>
        <button id="confirmLogout" class="glass-btn-danger">Sair</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="config.js?v=final_fix_115"></script>
  <script src="script.js?v=final_fix_115"></script>
  <script src="menu.js?v=final_fix_115"></script>
  <script src="perfil.js?v=final_fix_115"></script>
  <script>
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
